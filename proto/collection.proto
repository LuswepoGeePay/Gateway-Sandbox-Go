syntax = "proto3";

package collection;


option go_package = "/proto/collection;collection";


message CollectionRequest {
    string phone_number = 1;
    int32 amount = 2;
    //bool isFailed = 10;

}

message collectionResponse {
    bool success = 1;
    string message = 2;
    string token = 3;
    string status = 4;
    string role = 5;
    string id = 6;
    repeated string permissions = 7; // List of permissions granted to the user
    string tokenExpiry =9;
  

}