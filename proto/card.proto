syntax = "proto3";

package card;


option go_package = "/proto/card;card";


message cardRequest {
    string card_number = 1;
    string card_holder_name = 2; 
    string security_code = 3;
    string card_type = 4;
    string amount = 5;
    string currency = 6;
    string description = 7;
    string user_id =9;
    string base_url =10;
}

message cardResponse {
    bool success = 1;
    string message = 2;
    string token = 3;
    string status = 4;
    string role = 5;
    string id = 6;
    repeated string permissions = 7; // List of permissions granted to the user
    string tokenExpiry =8;

}

message RequestCode {
    string user_id =1;
    string transaction_reference =2;
 }


 message VerifyCode {
    string code = 1;
    string user_id =2;
    string transaction_reference =3;
 }