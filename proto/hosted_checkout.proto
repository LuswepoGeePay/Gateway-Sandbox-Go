syntax = "proto3";

package hcheckout;


option go_package = "/proto/hcheckout;hcheckout";


message HCheckoutRequest {
    string checkout_base_url = 1;
    string order_id =2;
    float amount = 3; // Uncomment if needed
    Customer customer = 4;
    string return_url = 5;
    bool receipt_redirect = 6;
}

  // Nested message for customer info
  message Customer {
    string name = 1;
    string email = 2;
  }
  
  message HCheckout {
    string checkout_url = 1;
    string order_id =2;
    string amount = 3; // Uncomment if needed
    Customer customer = 4;
    string return_url = 5;
    string checkoutID =6;
}

