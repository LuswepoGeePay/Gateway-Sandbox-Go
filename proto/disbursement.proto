syntax = "proto3";

package disbursement;


option go_package = "/proto/disbursement;disbursement";


message DisbursementRequest {
    string phone_number = 1;
    float amount = 2;
    string narration = 3;
   // bool isFailed =4;
}


message disbursementResponse {
    bool success = 1;
    string message = 2;
    string token = 3;
    string status = 4;
    string role = 5;
    string id = 6;
    repeated string permissions = 7; // List of permissions granted to the user
    string tokenExpiry =9;
    bool emailVerified =10;
    string accountStatus =11;
    string kycStatus =12;
}